<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas - AI-Powered News Analysis</title>

    <!-- React and Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
        }
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Helper Components ---

        const VerdictBadge = ({ verdict }) => {
            const verdictStyles = {
                supported: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30',
                refuted: 'bg-rose-500/20 text-rose-400 border-rose-500/30',
                not_enough_info: 'bg-slate-500/20 text-slate-400 border-slate-500/30'
            };
            const verdictText = {
                supported: 'Supported',
                refuted: 'Refuted',
                not_enough_info: 'Not Enough Info'
            }
            return (
                <span className={`px-3 py-1 text-sm font-medium rounded-full border ${verdictStyles[verdict] || verdictStyles.not_enough_info}`}>
                    {verdictText[verdict] || 'Unknown'}
                </span>
            );
        };

        const BiasBadge = ({ bias }) => {
            const biasStyles = {
                'Left': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                'Lean Left': 'bg-sky-500/20 text-sky-400 border-sky-500/30',
                'Center': 'bg-slate-500/20 text-slate-400 border-slate-500/30',
                'Center-Right': 'bg-orange-500/20 text-orange-400 border-orange-500/30',
                'Lean Right': 'bg-orange-500/20 text-orange-400 border-orange-500/30',
                'Right': 'bg-red-500/20 text-red-400 border-red-500/30',
                'Not Rated': 'bg-gray-500/20 text-gray-400 border-gray-500/30',
            };
            return (
                <span className={`px-3 py-1 text-xs font-semibold rounded-full border ${biasStyles[bias] || biasStyles['Not Rated']}`}>
                    {bias}
                </span>
            );
        };
        
        const LoadingSpinner = () => <div className="w-5 h-5 border-2 border-dashed rounded-full animate-spin border-white"></div>;


        // --- Main UI Components ---

        const HomePage = ({ onStartAnalysis }) => {
            const [activeTab, setActiveTab] = useState('url');
            const [url, setUrl] = useState('');
            const [file, setFile] = useState(null);
            const fileInputRef = useRef(null);

            const isInputValid = (activeTab === 'url' && url.trim() !== '') || (activeTab === 'file' && file);

            const handleFileChange = (e) => {
                if (e.target.files.length > 0) {
                    setFile(e.target.files[0]);
                }
            };
            
            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    setFile(e.dataTransfer.files[0]);
                    e.dataTransfer.clearData();
                }
            };

            const handleDisseminate = () => {
                if (!isInputValid) return;
                onStartAnalysis({ type: activeTab, value: activeTab === 'url' ? url : file });
            };

            const tabClass = (tabName) => `px-4 py-2.5 text-sm font-semibold rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-indigo-500 ${activeTab === tabName ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-700'}`;
            
            return (
                <div className="w-full max-w-4xl mx-auto px-4 py-8 md:py-16">
                    {/* Welcome Section */}
                    <header className="text-center mb-12">
                        <h1 className="text-4xl md:text-5xl font-bold text-white tracking-tight">Veritas</h1>
                        <p className="mt-4 text-lg text-slate-400 max-w-2xl mx-auto">
                            Welcome to Veritas, an AI-powered tool for a clearer perspective. Paste a news article URL or upload a document to analyze its claims, check against trusted sources, and understand its context in the media landscape.
                        </p>
                    </header>

                    {/* Input Section */}
                    <main className="bg-slate-800/50 border border-slate-700 rounded-xl shadow-2xl p-6 md:p-8">
                        <div className="flex justify-center mb-6">
                            <div className="bg-slate-900 p-1 rounded-lg flex space-x-1">
                                <button className={tabClass('url')} onClick={() => setActiveTab('url')}>Verify URL</button>
                                <button className={tabClass('file')} onClick={() => setActiveTab('file')}>Upload File</button>
                            </div>
                        </div>

                        {/* URL Input */}
                        <div style={{ display: activeTab === 'url' ? 'block' : 'none' }}>
                            <input
                                type="text"
                                value={url}
                                onChange={(e) => setUrl(e.target.value)}
                                placeholder="Paste news article link here..."
                                className="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                            />
                        </div>

                        {/* File Input */}
                        <div style={{ display: activeTab === 'file' ? 'block' : 'none' }}
                             onDragOver={(e) => e.preventDefault()}
                             onDrop={handleDrop}
                        >
                             <div 
                                className="relative flex flex-col items-center justify-center w-full h-32 px-4 py-6 text-center bg-slate-700 border-2 border-dashed border-slate-600 rounded-lg cursor-pointer hover:border-indigo-500 transition"
                                onClick={() => fileInputRef.current.click()}
                            >
                                <input type="file" ref={fileInputRef} onChange={handleFileChange} className="hidden" accept=".pdf,.doc,.docx,.txt" />
                                {file ? (
                                    <p className="text-white font-semibold">{file.name}</p>
                                ) : (
                                    <div>
                                        <svg className="mx-auto h-8 w-8 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
                                        <p className="mt-2 text-sm text-slate-400"><span className="font-semibold text-indigo-400">Click to upload</span> or drag and drop</p>
                                        <p className="text-xs text-slate-500">PDF, DOCX, DOC, or TXT</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="mt-8 text-center">
                            <button
                                onClick={handleDisseminate}
                                disabled={!isInputValid}
                                className="px-10 py-4 text-lg font-bold text-white bg-indigo-600 rounded-lg shadow-lg hover:bg-indigo-700 disabled:bg-slate-600 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-indigo-500 transition transform hover:scale-105"
                            >
                                Disseminate
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        const LoadingState = ({ input }) => {
            const getSourceName = () => {
                if (input.type === 'url') {
                    try {
                        return new URL(input.value).hostname;
                    } catch (e) {
                        return input.value;
                    }
                }
                return input.value.name;
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen text-center">
                    <div className="w-16 h-16 border-4 border-dashed rounded-full animate-spin border-indigo-500"></div>
                    <h2 className="mt-6 text-2xl font-semibold text-white">Analyzing...</h2>
                    <p className="mt-2 text-slate-400 max-w-sm truncate">{getSourceName()}</p>
                </div>
            );
        };

        const QuestionModal = ({ onClose, onSubmit }) => {
            const [question, setQuestion] = useState('');
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
                    <div className="bg-slate-800 border border-slate-700 rounded-lg p-6 w-full max-w-lg">
                        <h3 className="text-lg font-semibold text-white">Ask a follow-up question</h3>
                        <textarea
                            value={question}
                            onChange={(e) => setQuestion(e.target.value)}
                            className="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 mt-4 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            placeholder="e.g., What was the main outcome of the event described?"
                            rows="4"
                        ></textarea>
                        <div className="flex justify-end space-x-3 mt-4">
                            <button onClick={onClose} className="px-4 py-2 rounded-md text-sm font-semibold text-slate-300 hover:bg-slate-700">Cancel</button>
                            <button onClick={() => onSubmit(question)} disabled={!question.trim()} className="px-4 py-2 rounded-md text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-600">Submit</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultsPage = ({ data, onReset, onGenerateSummary, onAskQuestion, geminiData }) => {
            const [openEvidence, setOpenEvidence] = useState({});
            const [isModalOpen, setIsModalOpen] = useState(false);

            const toggleEvidence = (index) => {
                setOpenEvidence(prev => ({...prev, [index]: !prev[index]}));
            };

            const { status: docStatus, source_analysis, results } = data.result;

            const overallStyles = {
                clean_document: 'bg-emerald-500/20 text-emerald-300 border-emerald-500/30',
                inaccuracies_found: 'bg-rose-500/20 text-rose-300 border-rose-500/30',
            };
            const overallText = {
                clean_document: 'Clean Document',
                inaccuracies_found: 'Inaccuracies Found',
            };
            
            return (
                <div className="w-full max-w-4xl mx-auto px-4 py-8 md:py-16">
                    {isModalOpen && <QuestionModal onClose={() => setIsModalOpen(false)} onSubmit={(q) => { onAskQuestion(q); setIsModalOpen(false); }} />}
                    {/* Header */}
                    <header className="bg-slate-800/50 border border-slate-700 rounded-xl shadow-lg p-6 mb-8">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h2 className="text-2xl font-bold text-white break-all">{source_analysis.domain || 'Uploaded Document'}</h2>
                                <div className="flex items-center space-x-2 mt-2">
                                    <BiasBadge bias={source_analysis.bias} />
                                    <span className="text-slate-500 text-xs font-medium">Factuality: {source_analysis.factual_reporting}</span>
                                </div>
                            </div>
                            <div className={`px-4 py-2 text-lg font-bold rounded-lg border text-center ${overallStyles[docStatus]}`}>
                                {overallText[docStatus]}
                            </div>
                        </div>
                    </header>
                    
                    {/* Gemini Features */}
                    <div className="bg-slate-800/50 border border-slate-700 rounded-xl p-6 mb-8">
                        <h3 className="text-lg font-bold text-white mb-4">✨ AI-Powered Tools</h3>
                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={onGenerateSummary} disabled={geminiData.isLoading} className="flex-1 px-4 py-2 text-sm font-semibold text-white bg-indigo-600/80 rounded-lg hover:bg-indigo-600 disabled:bg-slate-600 flex items-center justify-center gap-2">
                                {geminiData.isLoading && geminiData.loadingAction === 'summary' ? <LoadingSpinner /> : 'Generate AI Summary'}
                            </button>
                             <button onClick={() => setIsModalOpen(true)} disabled={geminiData.isLoading} className="flex-1 px-4 py-2 text-sm font-semibold text-white bg-sky-600/80 rounded-lg hover:bg-sky-600 disabled:bg-slate-600 flex items-center justify-center gap-2">
                                {geminiData.isLoading && geminiData.loadingAction === 'question' ? <LoadingSpinner /> : 'Ask a Question'}
                            </button>
                        </div>
                        {geminiData.summary && (
                            <div className="mt-4 border-t border-slate-700 pt-4">
                                <h4 className="font-semibold text-indigo-400">AI Summary</h4>
                                <p className="text-slate-300 mt-2 text-sm whitespace-pre-wrap">{geminiData.summary}</p>
                            </div>
                        )}
                        {geminiData.answer && (
                             <div className="mt-4 border-t border-slate-700 pt-4">
                                <h4 className="font-semibold text-sky-400">Your Question: <span className="text-slate-300 font-normal">{geminiData.question}</span></h4>
                                <p className="text-slate-300 mt-2 text-sm whitespace-pre-wrap">{geminiData.answer}</p>
                            </div>
                        )}
                        {geminiData.error && <p className="text-rose-400 text-sm mt-4">{geminiData.error}</p>}
                    </div>

                    {/* Results Body */}
                    <main>
                       {results.length > 0 ? (
                           <div className="space-y-4">
                               {results.map((item, index) => (
                                   <div key={index} className="bg-slate-800/50 border border-slate-700 rounded-lg p-5">
                                       <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                           <p className="text-slate-200 flex-1">{item.claim}</p>
                                           <div className="flex-shrink-0">
                                                <VerdictBadge verdict={item.verdict} />
                                           </div>
                                       </div>
                                       <button 
                                            onClick={() => toggleEvidence(index)}
                                            className="mt-4 text-sm font-semibold text-indigo-400 hover:text-indigo-300 flex items-center"
                                       >
                                            {openEvidence[index] ? 'Hide Evidence' : 'Show Evidence'}
                                            <svg className={`w-4 h-4 ml-1 transition-transform ${openEvidence[index] ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                       </button>
                                       {openEvidence[index] && (
                                           <div className="mt-4 border-t border-slate-700 pt-4 space-y-3">
                                               {item.evidence.length > 0 ? item.evidence.map((ev, i) => (
                                                   <div key={i} className="bg-slate-800 p-3 rounded-md">
                                                       <a href={ev.url} target="_blank" rel="noopener noreferrer" className="text-slate-300 font-semibold hover:underline truncate block">
                                                           {ev.title || "Source"}
                                                       </a>
                                                       <p className="text-xs text-slate-500 mt-1">{ev.url ? new URL(ev.url).hostname : ''}</p>
                                                   </div>
                                               )) : <p className="text-slate-400 text-sm">No specific evidence was found for this claim.</p>}
                                           </div>
                                       )}
                                   </div>
                               ))}
                           </div>
                       ) : (
                           <div className="text-center bg-slate-800/50 border border-slate-700 rounded-lg p-12">
                               <h3 className="text-xl font-semibold text-white">No Verifiable Claims Found</h3>
                               <p className="mt-2 text-slate-400">The AI did not identify any sentences in this document as concrete, verifiable claims. This can happen with opinion pieces, narratives, or articles with few factual statements.</p>
                           </div>
                       )}

                        <div className="mt-12 text-center">
                            <button
                                onClick={onReset}
                                className="px-6 py-3 font-semibold text-white bg-slate-700 rounded-lg hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-slate-500 transition"
                            >
                                Analyze Another
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        // --- Main App Component ---

        const App = () => {
            const [appState, setAppState] = useState('home'); // 'home', 'loading', 'results', 'error'
            const [task, setTask] = useState({ id: null, input: null });
            const [resultsData, setResultsData] = useState(null);
            const [error, setError] = useState('');
            const pollingInterval = useRef(null);

            // --- State for Gemini Features ---
            const [geminiData, setGeminiData] = useState({
                summary: '',
                question: '',
                answer: '',
                isLoading: false,
                loadingAction: null, // 'summary' or 'question'
                error: '',
            });
            
            // --- Gemini API Call Helper ---
            const callGeminiAPI = async (prompt, systemInstruction) => {
                const apiKey = ""; // Canvas will provide this
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: {
                        parts: [{ text: systemInstruction }]
                    },
                };
                
                let lastError = null;
                for (let i = 0; i < 3; i++) { // Retry up to 3 times
                    try {
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            throw new Error(`API Error: ${response.statusText} (Status: ${response.status})`);
                        }
                        
                        const result = await response.json();
                        // --- FIX: Replaced optional chaining with older syntax ---
                        const candidate = result.candidates && result.candidates[0];
                        if (candidate && candidate.content && candidate.content.parts && candidate.content.parts[0] && candidate.content.parts[0].text) {
                            return candidate.content.parts[0].text;
                        } else {
                            throw new Error("Invalid response structure from Gemini API.");
                        }
                    } catch (err) {
                        lastError = err;
                        console.error(`Gemini API call attempt ${i + 1} failed:`, err);
                        if (i < 2) await new Promise(res => setTimeout(res, 1000 * Math.pow(2, i))); // Exponential backoff
                    }
                }
                throw lastError;
            };
            
            const handleGenerateSummary = async () => {
                setGeminiData(prev => ({ ...prev, isLoading: true, loadingAction: 'summary', error: '', summary: '', answer: '', question: '' }));
                const claims = resultsData.result.results.map(r => r.claim).join('\n');
                const prompt = `Based on the following extracted claims, please provide a neutral, one-paragraph summary of the key factual points of the article:\n\n${claims}`;
                const systemInstruction = "You are a helpful assistant that provides concise, neutral summaries based on provided text. Do not add any preamble or sign-off.";

                try {
                    const summary = await callGeminiAPI(prompt, systemInstruction);
                    setGeminiData(prev => ({ ...prev, summary, isLoading: false, loadingAction: null }));
                } catch(err) {
                    setGeminiData(prev => ({ ...prev, error: 'Failed to generate summary.', isLoading: false, loadingAction: null }));
                }
            };

            const handleAskQuestion = async (question) => {
                 if (!resultsData.result.text) {
                    setGeminiData(prev => ({...prev, error: "Cannot ask a question because the full text of the article is not available.", isLoading: false, loadingAction: null }));
                    return;
                }
                setGeminiData(prev => ({ ...prev, isLoading: true, loadingAction: 'question', error: '', summary: '', answer: '', question }));
                const prompt = `Based on the following article text, please answer the user's question.\n\nArticle Text:\n"""\n${resultsData.result.text}\n"""\n\nUser Question: "${question}"`;
                const systemInstruction = "You are a helpful Q&A assistant. Answer the user's question based *only* on the provided article text. If the answer is not in the text, say 'The answer to that question is not found in the article text.' Do not add any preamble or sign-off.";
                
                try {
                    const answer = await callGeminiAPI(prompt, systemInstruction);
                    setGeminiData(prev => ({ ...prev, answer, isLoading: false, loadingAction: null }));
                } catch(err) {
                    setGeminiData(prev => ({ ...prev, error: 'Failed to get an answer.', isLoading: false, loadingAction: null }));
                }
            };


            // Cleanup interval on component unmount
            useEffect(() => {
                return () => {
                    if (pollingInterval.current) {
                        clearInterval(pollingInterval.current);
                    }
                };
            }, []);

            const startPolling = (taskId) => {
                pollingInterval.current = setInterval(async () => {
                    try {
                        const response = await fetch(`/api/result/${taskId}`);
                        if (!response.ok) {
                            throw new Error('Network response was not ok');
                        }
                        const data = await response.json();

                        if (data.status === 'SUCCESS') {
                            setResultsData(data);
                            setAppState('results');
                            clearInterval(pollingInterval.current);
                        } else if (data.status === 'FAILURE') {
                            setError(data.error || 'An unknown error occurred during analysis.');
                            setAppState('error');
                            clearInterval(pollingInterval.current);
                        }
                        // If 'PENDING', do nothing and let the interval continue
                    } catch (err) {
                        setError('Failed to fetch results. Please check your connection.');
                        setAppState('error');
                        clearInterval(pollingInterval.current);
                    }
                }, 3000);
            };

            const handleStartAnalysis = async (input) => {
                setAppState('loading');
                setTask({ id: null, input });
                setGeminiData({ summary: '', question: '', answer: '', isLoading: false, loadingAction: null, error: '' }); // Reset Gemini state

                const endpoint = input.type === 'url' ? '/api/verify/url' : '/api/verify/file';
                const formData = new FormData();
                formData.append(input.type, input.value);

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        body: formData,
                    });
                    if (!response.ok) throw new Error('Failed to start analysis.');

                    const data = await response.json();

                    if (data.status === 'SUCCESS') { // Handle cached results
                        setResultsData(data);
                        setAppState('results');
                    } else if (data.task_id) {
                        setTask(prev => ({ ...prev, id: data.task_id }));
                        startPolling(data.task_id);
                    } else {
                        throw new Error('Invalid response from server.');
                    }
                } catch (err) {
                    setError(err.message);
                    setAppState('error');
                }
            };
            
            const handleReset = () => {
                setAppState('home');
                setTask({ id: null, input: null });
                setResultsData(null);
                setError('');
                if (pollingInterval.current) {
                    clearInterval(pollingInterval.current);
                }
            };
            
            const renderContent = () => {
                switch (appState) {
                    case 'loading':
                        return <LoadingState input={task.input} />;
                    case 'results':
                        return <ResultsPage 
                                    data={resultsData} 
                                    onReset={handleReset} 
                                    onGenerateSummary={handleGenerateSummary}
                                    onAskQuestion={handleAskQuestion}
                                    geminiData={geminiData}
                                />;
                    case 'error':
                        return (
                            <div className="flex flex-col items-center justify-center min-h-screen text-center">
                                <h2 className="text-2xl font-semibold text-rose-400">Analysis Failed</h2>
                                <p className="mt-2 text-slate-400 max-w-sm">{error}</p>

                                <button onClick={handleReset} className="mt-6 px-4 py-2 bg-indigo-600 text-white rounded-lg">Try Again</button>
                            </div>
                        );
                    case 'home':
                    default:
                        return <HomePage onStartAnalysis={handleStartAnalysis} />;
                }
            };

            return <div className="bg-slate-900 text-slate-300 min-h-screen">{renderContent()}</div>;
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
