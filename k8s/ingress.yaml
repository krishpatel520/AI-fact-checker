# Ingress — routes external traffic to the API and Flower services.
# Requires an Ingress controller (nginx-ingress or Traefik) installed in the cluster.
# For TLS: install cert-manager and update the tls section with your domain.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: veritas-ingress
  namespace: veritas
  annotations:
    # nginx-ingress annotations
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket upgrade support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # TLS (cert-manager)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # TLS — uncomment and update with your domain
  # tls:
  #   - hosts:
  #       - api.yourveritas.com
  #     secretName: veritas-tls
  rules:
    - host: api.yourveritas.com   # ← update this
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: veritas-api
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: veritas-api
                port:
                  number: 8000
          - path: /flower
            pathType: Prefix
            backend:
              service:
                name: flower
                port:
                  number: 5555
