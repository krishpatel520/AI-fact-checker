apiVersion: apps/v1
kind: Deployment
metadata:
  name: veritas-api
  namespace: veritas
  labels:
    app: veritas-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veritas-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: veritas-api
    spec:
      containers:
        - name: api
          image: ghcr.io/YOUR_ORG/veritas:latest   # update with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: MODE
              value: api
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: veritas-secrets
                  key: SERPER_API_KEY
          envFrom:
            - configMapRef:
                name: veritas-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: veritas-api
  namespace: veritas
spec:
  selector:
    app: veritas-api
  ports:
    - port: 8000
      targetPort: 8000

---
# Horizontal Pod Autoscaler — scales API replicas based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: veritas-api-hpa
  namespace: veritas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: veritas-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
