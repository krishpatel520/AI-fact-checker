services:

  # ── Message broker & result backend ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI application ─────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./verified_articles.db
    volumes:
      # Persist the SQLite database between container restarts
      - ./verified_articles.db:/app/verified_articles.db
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # ── Celery background worker ────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./verified_articles.db
    volumes:
      - ./verified_articles.db:/app/verified_articles.db
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.celery_app.celery worker --loglevel=info --pool=gevent --concurrency=4
